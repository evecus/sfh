name: Build

on:
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/sfh

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      # ── Binary release ────────────────────────────────────────────────
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/sfh_linux_amd64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/sfh_linux_arm64   .
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/sfh_darwin_amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/sfh_darwin_arm64  .
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/sfh_windows_amd64.exe .
          GOOS=windows GOARCH=arm64 go build -ldflags="-s -w" -o dist/sfh_windows_arm64.exe .

      - name: Tag
        id: tag
        run: |
          TAG="build-$(date -u +'%Y%m%d-%H%M%S')"
          git tag $TAG
          git push origin $TAG
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/*

      # ── Docker image ──────────────────────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
